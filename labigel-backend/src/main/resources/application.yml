spring:
  application:
    name: labigel-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/labigel_db}
    username: ${SPRING_DATASOURCE_USERNAME:labigel}
    password: ${SPRING_DATASOURCE_PASSWORD:labigel2024}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:5a22530a6c0b4845942468516d2179752538466e3a7923412a43322a363753713f68444a72742962456f3458625927514a6047514f7b2c6275727b7c252b474244}
  expiration: 86400000 # 24 hours in ms

app:
  upload:
    dir: ${UPLOAD_DIR:/app/uploads}
